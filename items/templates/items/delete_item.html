{% extends 'base.html' %}

{% block title %}Delete Item - FreshTrack{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container confirm-delete">
        <h1>Delete Item?</h1>
        <p class="warning-text">Are you sure you want to delete <strong>{{ item.item_name }}</strong>?</p>
        <p class="warning-subtext">This action cannot be undone.</p>

        <form method="post" class="delete-form">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-delete">Yes, Delete It</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
