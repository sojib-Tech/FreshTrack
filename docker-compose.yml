version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: freshtrack_db
      POSTGRES_USER: freshtrack_user
      POSTGRES_PASSWORD: freshtrack_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshtrack_user -d freshtrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn freshtrack_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgresql://freshtrack_user:freshtrack_password@db:5432/freshtrack_db"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
